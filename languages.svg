<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1218"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="220" rx="16" fill="url(#bg)" stroke="#1e2d3d" stroke-width="1.5"/>
  <rect width="800" height="3" rx="2" fill="#7c3aed"/>

  <text x="36" y="38" font-family="monospace" font-size="11" fill="#6b8097" letter-spacing="2">LANGUAGE PROFICIENCY</text>

  <!-- English 95% -->
  <text x="36" y="74" font-family="sans-serif" font-size="13" fill="#e2eaf4">🇬🇧  English</text>
  <text x="200" y="74" font-family="monospace" font-size="11" fill="#6b8097">Expert</text>
  <rect x="290" y="63" width="440" height="12" rx="6" fill="#131b24"/>
  <rect x="290" y="63" width="418" height="12" rx="6" fill="#00d4ff" filter="url(#glow)"/>
  <text x="742" y="74" font-family="monospace" font-size="11" fill="#00d4ff">95%</text>

  <!-- Ukrainian 80% -->
  <text x="36" y="114" font-family="sans-serif" font-size="13" fill="#e2eaf4">🇺🇦  Ukrainian</text>
  <text x="200" y="114" font-family="monospace" font-size="11" fill="#6b8097">Fluent</text>
  <rect x="290" y="103" width="440" height="12" rx="6" fill="#131b24"/>
  <rect x="290" y="103" width="352" height="12" rx="6" fill="#10b981" filter="url(#glow)"/>
  <text x="742" y="114" font-family="monospace" font-size="11" fill="#10b981">80%</text>

  <!-- Russian 95% -->
  <text x="36" y="154" font-family="sans-serif" font-size="13" fill="#e2eaf4">🇷🇺  Russian</text>
  <text x="200" y="154" font-family="monospace" font-size="11" fill="#6b8097">Expert</text>
  <rect x="290" y="143" width="440" height="12" rx="6" fill="#131b24"/>
  <rect x="290" y="143" width="418" height="12" rx="6" fill="#a78bfa" filter="url(#glow)"/>
  <text x="742" y="154" font-family="monospace" font-size="11" fill="#a78bfa">95%</text>

  <!-- French 60% -->
  <text x="36" y="194" font-family="sans-serif" font-size="13" fill="#e2eaf4">🇫🇷  French</text>
  <text x="200" y="194" font-family="monospace" font-size="11" fill="#6b8097">Intermediate</text>
  <rect x="290" y="183" width="440" height="12" rx="6" fill="#131b24"/>
  <rect x="290" y="183" width="264" height="12" rx="6" fill="#f59e0b" filter="url(#glow)"/>
  <text x="742" y="194" font-family="monospace" font-size="11" fill="#f59e0b">60%</text>
