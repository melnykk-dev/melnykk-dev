<svg width="400" height="340" viewBox="0 0 400 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#0d1117"/></linearGradient>
  </defs>
  <rect width="400" height="340" rx="8" fill="url(#rbg)" stroke="#21262d" stroke-width="1"/>
  <text x="20" y="28" fill="#6e7681" font-family="monospace" font-size="10" font-weight="600" letter-spacing="2">DOMAIN RADAR</text>
  <line x1="20" y1="38" x2="380" y2="38" stroke="#21262d" stroke-width="1"/>

  <!-- Center -->
  <!-- 7 axes, center = 200,195, radius=110 -->
  <!-- angles: 0=top, then clockwise every 51.4deg -->
  <!-- labels: Mathematics, Research, Education, A/V Design, Programming, Writing, Systems -->
  <!-- axis endpoints (r=110 from 200,195): -->
  <!-- 0: 200,85   -->
  <!-- 1: 293,137  -->
  <!-- 2: 293,253  -->
  <!-- 3: 200,305  -->
  <!-- 4: 107,253  -->
  <!-- 5: 107,137  -->
  <!-- 6: 200,85 -- 7pts so 360/7=51.43deg each -->
  <!-- Recompute for 7 axes starting at -90deg: -->
  <!-- a0=-90:  200+110*cos(-90)=200,  195+110*sin(-90)=85  -->
  <!-- a1=-38.57: 200+110*cos(-38.57)=286, 195+110*sin(-38.57)=127 -->
  <!-- a2=12.86: 200+110*cos(12.86)=307, 195+110*sin(12.86)=219 -->
  <!-- a3=64.29: 200+110*cos(64.29)=248, 195+110*sin(64.29)=294 -->
  <!-- a4=115.71: 200+110*cos(115.71)=152, 195+110*sin(115.71)=294 -->
  <!-- a5=167.14: 200+110*cos(167.14)=93, 195+110*sin(167.14)=219 -->
  <!-- a6=218.57: 200+110*cos(218.57)=114, 195+110*sin(218.57)=127 -->

  <!-- Grid rings at 25%, 50%, 75%, 100% of r=110 -->
  <!-- 25%=27.5, 50%=55, 75%=82.5, 100%=110 -->
  <!-- Ring polygons (7-sided) -->

  <!-- 25% ring -->
  <polygon points="200,167 207,171 209,178 204,184 196,184 191,178 193,171" fill="none" stroke="#21262d" stroke-width="1"/>
  <!-- 50% ring -->
  <polygon points="200,140 214,148 218,162 209,173 191,173 182,162 186,148" fill="none" stroke="#21262d" stroke-width="1"/>
  <!-- 75% ring -->
  <polygon points="200,112 221,124 227,145 213,162 187,162 173,145 179,124" fill="none" stroke="#21262d" stroke-width="1"/>
  <!-- 100% ring -->
  <polygon points="200,85 286,127 307,219 248,294 152,294 93,219 114,127" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Axes -->
  <line x1="200" y1="195" x2="200" y2="85" stroke="#21262d" stroke-width="1"/>
  <line x1="200" y1="195" x2="286" y2="127" stroke="#21262d" stroke-width="1"/>
  <line x1="200" y1="195" x2="307" y2="219" stroke="#21262d" stroke-width="1"/>
  <line x1="200" y1="195" x2="248" y2="294" stroke="#21262d" stroke-width="1"/>
  <line x1="200" y1="195" x2="152" y2="294" stroke="#21262d" stroke-width="1"/>
  <line x1="200" y1="195" x2="93" y2="219" stroke="#21262d" stroke-width="1"/>
  <line x1="200" y1="195" x2="114" y2="127" stroke="#21262d" stroke-width="1"/>

  <!-- Data polygon: scores 92,88,90,85,80,78,85 as fraction of r=110 -->
  <!-- Mathematics(0)=92%: 200, 195-101=94 -->
  <!-- Research(1)=88%: 200+110*.88*cos(-38.57)=200+75.8=276, 195+110*.88*sin(-38.57)=195-60.6=134 -->
  <!-- Education(2)=90%: 200+110*.9*cos(12.86)=200+96.8=297, 195+110*.9*sin(12.86)=195+22.3=217 -->
  <!-- A/V(3)=82%: 200+110*.82*cos(64.29)=200+39.4=239, 195+110*.82*sin(64.29)=195+81.5=277 -->
  <!-- Programming(4)=80%: 200+110*.8*cos(115.71)=200-38.4=162, 195+110*.8*sin(115.71)=195+79.4=274 -->
  <!-- Writing(5)=78%: 200+110*.78*cos(167.14)=200-83.6=116, 195+110*.78*sin(167.14)=195+19.2=214 -->
  <!-- Systems(6)=85%: 200+110*.85*cos(218.57)=200-78.1=122, 195+110*.85*sin(218.57)=195-58.4=137 -->

  <polygon
    points="200,94 276,134 297,217 239,277 162,274 116,214 122,137"
    fill="rgba(88,166,255,0.12)"
    stroke="#58a6ff"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Data points -->
  <circle cx="200" cy="94"  r="3.5" fill="#58a6ff"/>
  <circle cx="276" cy="134" r="3.5" fill="#58a6ff"/>
  <circle cx="297" cy="217" r="3.5" fill="#58a6ff"/>
  <circle cx="239" cy="277" r="3.5" fill="#58a6ff"/>
  <circle cx="162" cy="274" r="3.5" fill="#58a6ff"/>
  <circle cx="116" cy="214" r="3.5" fill="#58a6ff"/>
  <circle cx="122" cy="137" r="3.5" fill="#58a6ff"/>

  <!-- Labels -->
  <text x="200" y="76"  font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Mathematics</text>
  <text x="296" y="122" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="start">Research</text>
  <text x="316" y="224" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="start">Education</text>
  <text x="246" y="313" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">A/V Design</text>
  <text x="154" y="313" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">Programming</text>
  <text x="60"  y="224" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="end">Writing</text>
  <text x="104" y="122" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="end">Systems</text>

  <!-- Score labels -->
  <text x="200" y="91"  font-family="monospace" font-size="8.5" fill="#58a6ff" text-anchor="middle">92</text>
  <text x="282" y="128" font-family="monospace" font-size="8.5" fill="#58a6ff" text-anchor="start">88</text>
  <text x="302" y="212" font-family="monospace" font-size="8.5" fill="#58a6ff" text-anchor="start">90</text>
  <text x="244" y="271" font-family="monospace" font-size="8.5" fill="#58a6ff" text-anchor="middle">82</text>
  <text x="157" y="268" font-family="monospace" font-size="8.5" fill="#58a6ff" text-anchor="middle">80</text>
  <text x="108" y="210" font-family="monospace" font-size="8.5" fill="#58a6ff" text-anchor="end">78</text>
  <text x="117" y="132" font-family="monospace" font-size="8.5" fill="#58a6ff" text-anchor="end">85</text>
</svg>
