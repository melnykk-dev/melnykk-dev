<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1218"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
    <filter id="glow1"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Card 1: Courses -->
  <rect x="0" y="0" width="188" height="160" rx="14" fill="#0d1218" stroke="#1e2d3d" stroke-width="1.5"/>
  <rect x="0" y="0" width="188" height="3" rx="2" fill="#00d4ff"/>
  <text x="94" y="52" font-family="sans-serif" font-size="11" fill="#6b8097" text-anchor="middle" letter-spacing="1">COURSES LIVE</text>
  <text x="94" y="110" font-family="monospace" font-size="52" font-weight="bold" fill="#00d4ff" text-anchor="middle" filter="url(#glow1)">31+</text>
  <text x="94" y="140" font-family="sans-serif" font-size="11" fill="#2d4a5e" text-anchor="middle">across all disciplines</text>

  <!-- Card 2: Certificates -->
  <rect x="204" y="0" width="188" height="160" rx="14" fill="#0d1218" stroke="#1e2d3d" stroke-width="1.5"/>
  <rect x="204" y="0" width="188" height="3" rx="2" fill="#10b981"/>
  <text x="298" y="52" font-family="sans-serif" font-size="11" fill="#6b8097" text-anchor="middle" letter-spacing="1">CERT PROGRAMMES</text>
  <text x="298" y="110" font-family="monospace" font-size="52" font-weight="bold" fill="#10b981" text-anchor="middle" filter="url(#glow1)">28</text>
  <text x="298" y="140" font-family="sans-serif" font-size="11" fill="#2d4a5e" text-anchor="middle">globally recognized</text>

  <!-- Card 3: Companies -->
  <rect x="408" y="0" width="188" height="160" rx="14" fill="#0d1218" stroke="#1e2d3d" stroke-width="1.5"/>
  <rect x="408" y="0" width="188" height="3" rx="2" fill="#f59e0b"/>
  <text x="502" y="52" font-family="sans-serif" font-size="11" fill="#6b8097" text-anchor="middle" letter-spacing="1">COMPANIES FOUNDED</text>
  <text x="502" y="110" font-family="monospace" font-size="52" font-weight="bold" fill="#f59e0b" text-anchor="middle" filter="url(#glow1)">2</text>
  <text x="502" y="140" font-family="sans-serif" font-size="11" fill="#2d4a5e" text-anchor="middle">in 2025 alone</text>

  <!-- Card 4: Languages -->
  <rect x="612" y="0" width="188" height="160" rx="14" fill="#0d1218" stroke="#1e2d3d" stroke-width="1.5"/>
  <rect x="612" y="0" width="188" height="3" rx="2" fill="#a78bfa"/>
  <text x="706" y="52" font-family="sans-serif" font-size="11" fill="#6b8097" text-anchor="middle" letter-spacing="1">LANGUAGES</text>
  <text x="706" y="110" font-family="monospace" font-size="52" font-weight="bold" fill="#a78bfa" text-anchor="middle" filter="url(#glow1)">4</text>
  <text x="706" y="140" font-family="sans-serif" font-size="11" fill="#2d4a5e" text-anchor="middle">EN · UK · RU · FR</text>
