<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1218"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099bb"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="bar6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" rx="16" fill="url(#bg)"/>
  <rect width="800" height="340" rx="16" fill="none" stroke="#1e2d3d" stroke-width="1.5"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="800" height="3" rx="2" fill="url(#bar1)"/>

  <!-- Title -->
  <text x="36" y="46" font-family="monospace" font-size="11" fill="#6b8097" letter-spacing="2">TECHNICAL SKILLS</text>

  <!-- Grid lines -->
  <line x1="220" y1="60" x2="220" y2="310" stroke="#1e2d3d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="385" y1="60" x2="385" y2="310" stroke="#1e2d3d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="550" y1="60" x2="550" y2="310" stroke="#1e2d3d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="715" y1="60" x2="715" y2="310" stroke="#1e2d3d" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="220" y="315" font-family="monospace" font-size="9" fill="#2d4a5e" text-anchor="middle">25%</text>
  <text x="385" y="315" font-family="monospace" font-size="9" fill="#2d4a5e" text-anchor="middle">50%</text>
  <text x="550" y="315" font-family="monospace" font-size="9" fill="#2d4a5e" text-anchor="middle">75%</text>
  <text x="715" y="315" font-family="monospace" font-size="9" fill="#2d4a5e" text-anchor="middle">100%</text>

  <!-- Row 1: Web Development 95% -->
  <text x="36" y="92" font-family="sans-serif" font-size="13" fill="#c8d8e8">Web Development</text>
  <rect x="220" y="79" width="495" height="10" rx="5" fill="#131b24"/>
  <rect x="220" y="79" width="470" height="10" rx="5" fill="url(#bar1)" filter="url(#glow)"/>
  <text x="757" y="90" font-family="monospace" font-size="11" fill="#00d4ff">95%</text>

  <!-- Row 2: Educational Tech 90% -->
  <text x="36" y="136" font-family="sans-serif" font-size="13" fill="#c8d8e8">Educational Tech / LMS</text>
  <rect x="220" y="123" width="495" height="10" rx="5" fill="#131b24"/>
  <rect x="220" y="123" width="445" height="10" rx="5" fill="url(#bar3)" filter="url(#glow)"/>
  <text x="757" y="134" font-family="monospace" font-size="11" fill="#a78bfa">90%</text>

  <!-- Row 3: Game Development 80% -->
  <text x="36" y="180" font-family="sans-serif" font-size="13" fill="#c8d8e8">Game Development</text>
  <rect x="220" y="167" width="495" height="10" rx="5" fill="#131b24"/>
  <rect x="220" y="167" width="396" height="10" rx="5" fill="url(#bar2)" filter="url(#glow)"/>
  <text x="757" y="178" font-family="monospace" font-size="11" fill="#10b981">80%</text>

  <!-- Row 4: Design & UX 82% -->
  <text x="36" y="224" font-family="sans-serif" font-size="13" fill="#c8d8e8">Design &amp; UX</text>
  <rect x="220" y="211" width="495" height="10" rx="5" fill="#131b24"/>
  <rect x="220" y="211" width="406" height="10" rx="5" fill="url(#bar5)" filter="url(#glow)"/>
  <text x="757" y="222" font-family="monospace" font-size="11" fill="#f472b6">82%</text>

  <!-- Row 5: Data & Research 75% -->
  <text x="36" y="268" font-family="sans-serif" font-size="13" fill="#c8d8e8">Data &amp; Research</text>
  <rect x="220" y="255" width="495" height="10" rx="5" fill="#131b24"/>
  <rect x="220" y="255" width="371" height="10" rx="5" fill="url(#bar4)" filter="url(#glow)"/>
  <text x="757" y="266" font-family="monospace" font-size="11" fill="#f59e0b">75%</text>

  <!-- Row 6: Project Management 78% -->
  <text x="36" y="312" font-family="sans-serif" font-size="13" fill="#c8d8e8">Project Management</text>
  <rect x="220" y="299" width="495" height="10" rx="5" fill="#131b24"/>
  <rect x="220" y="299" width="386" height="10" rx="5" fill="url(#bar6)" filter="url(#glow)"/>
  <text x="757" y="310" font-family="monospace" font-size="11" fill="#34d399">78%</text>
</svg>
