  <text x="60" y="168" font-family="sans-serif" font-size="10" fill="#6b8097" text-anchor="middle">Courses</text>
  <line x1="118" y1="138" x2="118" y2="175" stroke="#1e2d3d" stroke-width="1"/>
  <text x="185" y="152" font-family="monospace" font-size="22" font-weight="bold" fill="#10b981" text-anchor="middle" filter="url(#glow)">28</text>
  <text x="185" y="168" font-family="sans-serif" font-size="10" fill="#6b8097" text-anchor="middle">Certificates</text>
