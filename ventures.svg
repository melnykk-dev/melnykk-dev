  <text x="205" y="197" font-family="monospace" font-size="10" fill="#6b8097" text-anchor="middle">"Learn as fast as others dream."</text>

  <!-- VILLAGEZ card -->
  <rect x="410" y="52" width="370" height="154" rx="12" fill="url(#gPurple)" stroke="#7c3aed44" stroke-width="1.5"/>
